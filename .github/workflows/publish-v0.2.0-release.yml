name: Publish v0.2.0 Release

on:
  push:
    branches:
      - main

jobs:
  publish-release:
    if: contains(github.event.head_commit.message, 'publish v0.2.0 release')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.2.0
          name: v0.2.0
          body_path: RELEASE_NOTES_v0.2.0.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
